<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Facts Trainer – Adaptive 4‑Card</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:1rem;background:#f7f9fb;color:#222;}
h1{margin-top:0;text-align:center;}
#container{max-width:500px;margin:0 auto;}
#problem{font-size:3rem;text-align:center;margin:2rem 0;}
input[type=number]{font-size:2.2rem;width:180px;text-align:center;}
button{font-size:1rem;padding:.6rem 1rem;margin:.5rem;border:none;border-radius:4px;background:#0077ff;color:#fff;}
button:disabled{background:#999;}
#feedback{font-size:1.2rem;height:1.5rem;text-align:center;margin:.5rem 0;}
#score{font-size:1rem;text-align:center;margin-top:1rem;}
label{margin-right:1rem;}
input[type=range]{width:100%;}
.range-label{text-align:center;font-size:.9rem;margin-top:-.3rem;margin-bottom:.8rem;}
#popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fffa;border-radius:12px;padding:1.5rem 2rem;font-size:1.4rem;font-weight:bold;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,.25);display:none;z-index:1000;}
</style>
</head>
<body>
<h1>Math Facts Trainer</h1>
<div id="container">

<div id="setup">
  <p>Select operations:</p>
  <label><input type="checkbox" id="add" checked> +</label>
  <label><input type="checkbox" id="sub" checked> −</label>
  <label><input type="checkbox" id="mul" checked> ×</label>
  <label><input type="checkbox" id="div" checked> ÷</label>

  <p>Choose starting difficulty (largest number used):</p>
  <input type="range" id="maxRange" min="5" max="100" value="10" oninput="updateRangeLabel(this.value)">
  <div class="range-label">Up to <span id="rangeVal">10</span></div>

  <p><button onclick="startQuiz()">Start</button></p>
</div>

<div id="quiz" style="display:none;">
  <div id="problem"></div>
  <input id="answer" type="number" autocomplete="off" onkeydown="if(event.key==='Enter')checkAnswer();">
  <button onclick="checkAnswer()">Check</button>
  <div id="feedback"></div>
  <div id="score"></div>
  <p><button onclick="endQuiz()">End Session</button></p>
</div>

</div>

<div id="popup"></div>

<script>
let ops=[],a,b,op,correctAns;
let total=0,correct=0,maxNum=10;
const MIN_NUM=5, MAX_NUM=100;
let streak=0;      // counts problems since last difficulty shift
let correctStreak=0; // counts correct answers in that set

// Web Audio setup
const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();

function beep(freq,duration){
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type='sine';
  osc.frequency.value=freq;
  osc.connect(gain);
  gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.2,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+duration/1000);
  osc.start();
  osc.stop(ctx.currentTime+duration/1000);
}

function updateRangeLabel(val){document.getElementById('rangeVal').innerText=val;}

function startQuiz(){
  ops=[];
  if(document.getElementById('add').checked) ops.push('+');
  if(document.getElementById('sub').checked) ops.push('-');
  if(document.getElementById('mul').checked) ops.push('×');
  if(document.getElementById('div').checked) ops.push('÷');
  if(ops.length===0){alert('Select at least one operation');return;}
  maxNum=parseInt(document.getElementById('maxRange').value,10);
  total=0;correct=0;streak=0;correctStreak=0;
  document.getElementById('setup').style.display='none';
  document.getElementById('quiz').style.display='block';
  nextProblem();
}

function randInclusive(max){return Math.floor(Math.random()*(max+1));}

function nextProblem(){
  op=ops[randInclusive(ops.length-1)];
  switch(op){
    case '+':
      a=randInclusive(maxNum); b=randInclusive(maxNum); correctAns=a+b; break;
    case '-':
      a=randInclusive(maxNum); b=randInclusive(maxNum); if(b>a){[a,b]=[b,a];} correctAns=a-b; break;
    case '×':
      a=randInclusive(maxNum); b=randInclusive(maxNum); correctAns=a*b; break;
    case '÷':
      b=randInclusive(maxNum-1)+1; correctAns=randInclusive(maxNum); a=b*correctAns; break;
  }
  document.getElementById('problem').innerText=`${a} ${op} ${b} = ?`;
  document.getElementById('answer').value='';
  document.getElementById('answer').focus();
  document.getElementById('feedback').innerText='';
  document.getElementById('score').innerText=`Score: ${correct}/${total} • Difficulty: ≤ ${maxNum}`;
}

function showPopup(msg){
  const p=document.getElementById('popup');
  p.innerText=msg;
  p.style.display='block';
  beep(880,250);
  setTimeout(()=>{p.style.display='none';},1500);
}

function adjustDifficulty(){
  // called after each 4‑problem set
  const allCorrect = (correctStreak === 4);
  const noneCorrect = (correctStreak === 0);
  const old=maxNum;
  if(allCorrect){maxNum=Math.min(maxNum+1,MAX_NUM);}
  else if(noneCorrect){maxNum=Math.max(maxNum-1,MIN_NUM);}
  if(maxNum!==old){
    const msg=allCorrect?`🎉 Perfect set! Difficulty up to ${maxNum}!`:`💪 Keep practicing! Difficulty down to ${maxNum}.`;
    showPopup(msg);
  }
  // reset counters
  streak=0;
  correctStreak=0;
}

function checkAnswer(){
  const ans=parseInt(document.getElementById('answer').value,10);
  if(isNaN(ans)) return;

  const gotItRight = (ans===correctAns);
  total++;
  streak++;
  if(gotItRight){
    correct++;
    correctStreak++;
    document.getElementById('feedback').innerText='✅ Correct!';
    beep(660,200);
  }else{
    document.getElementById('feedback').innerText=`❌ ${a} ${op} ${b} = ${correctAns}`;
    beep(180,400);
  }

  if(streak===4){
    adjustDifficulty();
  }

  document.getElementById('score').innerText=`Score: ${correct}/${total} • Difficulty: ≤ ${maxNum}`;
  setTimeout(nextProblem,1000);
}

function endQuiz(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('setup').style.display='block';
}
</script>
</body>
</html>
