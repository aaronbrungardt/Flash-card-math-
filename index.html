<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Facts Trainer – Boss Cards Edition</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:1rem;background:#f7f9fb;color:#222;}
h1{margin-top:0;text-align:center;}
#container{max-width:620px;margin:0 auto;}
#problem{font-size:3rem;text-align:center;margin:1.6rem 0;min-height:3.5rem;}
input[type=number]{font-size:2.2rem;width:180px;text-align:center;}
button{font-size:1rem;padding:.7rem 1rem;margin:.5rem;border:none;border-radius:10px;background:#0077ff;color:#fff;}
button.secondary{background:#5b6575;}
.choice-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:.6rem;margin:1rem 0;}
.choice-btn{min-width:110px;font-size:1.2rem;padding:.8rem 1rem;}
button:disabled{background:#999;}
#feedback{font-size:1.2rem;min-height:1.5rem;text-align:center;margin:.5rem 0;}
#score{font-size:1rem;text-align:center;margin-top:1rem;line-height:1.5;}
label{margin-right:1rem;}
input[type=range]{width:100%;}
.range-label{text-align:center;font-size:.95rem;margin-top:-.3rem;margin-bottom:.8rem;}
#popup,#rewardModal,#bossBanner{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  background:#fff;border-radius:18px;padding:1.2rem 1.4rem;text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,.28);display:none;z-index:1000;
}
#popup{font-size:1.3rem;font-weight:bold;max-width:320px;}
#rewardModal{width:min(92vw,420px);border:6px solid #ffd54a;}
#bossBanner{width:min(92vw,440px);border:6px solid #ff6a3d;background:#fff7f0;}
#rewardBackdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:999;
}
.reward-art{font-size:4.3rem;line-height:1;margin:.2rem 0 .5rem 0;}
.reward-title{font-size:1.6rem;font-weight:700;margin-bottom:.3rem;}
.reward-text{font-size:1.08rem;line-height:1.35;}
.small-note{font-size:.95rem;opacity:.85;margin-top:.5rem;}
select{font-size:1rem;padding:.4rem;border-radius:8px;width:100%;}
#answerArea{text-align:center;}
#bossLabel{font-weight:700;color:#d54a1f;margin-bottom:.4rem;font-size:1.2rem;}
</style>
</head>
<body>
<h1>Math Facts Trainer</h1>
<div id="container">

<div id="setup">
  <p>Select operations:</p>
  <label><input type="checkbox" id="add" checked> +</label>
  <label><input type="checkbox" id="sub" checked> −</label>
  <label><input type="checkbox" id="mul" checked> ×</label>
  <label><input type="checkbox" id="div" checked> ÷</label>

  <p>Choose starting difficulty (largest number used):</p>
  <input type="range" id="maxRange" min="5" max="100" value="10" oninput="updateRangeLabel(this.value)">
  <div class="range-label">Up to <span id="rangeVal">10</span></div>

  <p>Difficulty style:</p>
  <select id="difficultyMode">
    <option value="range">Number size only</option>
    <option value="mixed" selected>Mixed: size + harder problem types</option>
  </select>

  <p><button onclick="startQuiz()">Start</button></p>
</div>

<div id="quiz" style="display:none;">
  <div id="bossLabel"></div>
  <div id="problem"></div>

  <div id="answerArea">
    <input id="answer" type="number" autocomplete="off" onkeydown="if(event.key==='Enter')checkAnswer();">
    <div id="choiceArea" class="choice-wrap" style="display:none;"></div>
    <button id="checkBtn" onclick="checkAnswer()">Check</button>
  </div>

  <div id="feedback"></div>
  <div id="score"></div>
  <p><button class="secondary" onclick="endQuiz()">End Session</button></p>
</div>

</div>

<div id="popup"></div>
<div id="rewardBackdrop"></div>

<div id="rewardModal">
  <div class="reward-art" id="rewardArt">🚀</div>
  <div class="reward-title" id="rewardTitle">Awesome work!</div>
  <div class="reward-text" id="rewardText">You hit a streak milestone.</div>
  <div class="small-note">Tap anywhere to keep going</div>
</div>

<div id="bossBanner">
  <div class="reward-art">👹</div>
  <div class="reward-title">Boss Card!</div>
  <div class="reward-text">Five correct in a row unlocked a challenge card.</div>
  <div class="small-note">Tap anywhere to continue</div>
</div>

<script>
let ops=[],a,b,op,correctAns;
let total=0,correct=0,maxNum=10;
const MIN_NUM=5, MAX_NUM=100;
let streak=0;
let correctStreak=0;
let combo=0;
let difficultyMode='mixed';
let currentFormat='standard';
let currentStatementTruth=true;
let isBossCard=false;
let awaitingNext=false;

const REWARD_MILESTONES = [5,10,15,20,25];
const REWARD_DATA = {
  5:  {art:"🐸", title:"Boing! 5 in a row!",  text:"You just landed a five-answer frog hop. Nice work."},
  10: {art:"🦖", title:"10 in a row!",        text:"Tiny math tyrannosaur mode activated."},
  15: {art:"🚀", title:"15 in a row!",        text:"You are blasting through these problems."},
  20: {art:"🦄", title:"20 in a row!",        text:"Wild unicorn math energy. Keep it rolling."},
  25: {art:"🐉", title:"25 in a row!",        text:"Legend streak! You woke the math dragon."}
};

const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();

function beep(freq,duration,type='sine',vol=0.2){
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type=type;
  osc.frequency.value=freq;
  osc.connect(gain);
  gain.connect(ctx.destination);
  gain.gain.setValueAtTime(vol,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+duration/1000);
  osc.start();
  osc.stop(ctx.currentTime+duration/1000);
}

function rewardSound(){
  const notes=[523,659,784,1047];
  notes.forEach((n,i)=>setTimeout(()=>beep(n,180,'triangle',0.18),i*110));
}

function bossSound(){
  const notes=[330,392,523,659];
  notes.forEach((n,i)=>setTimeout(()=>beep(n,220,'square',0.18),i*120));
}

function updateRangeLabel(val){document.getElementById('rangeVal').innerText=val;}

function startQuiz(){
  if (ctx.state === 'suspended') { ctx.resume(); }
  ops=[];
  if(document.getElementById('add').checked) ops.push('+');
  if(document.getElementById('sub').checked) ops.push('-');
  if(document.getElementById('mul').checked) ops.push('×');
  if(document.getElementById('div').checked) ops.push('÷');
  if(ops.length===0){alert('Select at least one operation');return;}
  difficultyMode=document.getElementById('difficultyMode').value;
  maxNum=parseInt(document.getElementById('maxRange').value,10);
  total=0;correct=0;streak=0;correctStreak=0;combo=0;isBossCard=false;awaitingNext=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('quiz').style.display='block';
  hideReward();
  nextProblem();
}

function randInclusive(max){return Math.floor(Math.random()*(max+1));}
function randBetween(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function chooseProblemMode(){
  if(difficultyMode==='range'){ return 'normal'; }
  if(maxNum < 12) return 'normal';
  if(maxNum < 25) return Math.random() < 0.35 ? 'bridge10' : 'normal';
  if(maxNum < 45) return ['normal','bridge10','doubleDigit'][randInclusive(2)];
  if(maxNum < 70) return ['normal','bridge10','doubleDigit','hardMultiply'][randInclusive(3)];
  return ['normal','bridge10','doubleDigit','hardMultiply','remainderFreeDivision'][randInclusive(4)];
}

function chooseFormat(){
  const formats = ['standard'];
  if(difficultyMode==='mixed'){
    if(maxNum >= 8) formats.push('missing');
    if(maxNum >= 12) formats.push('choice');
    if(maxNum >= 16) formats.push('truefalse');
  }
  if(isBossCard){
    const bossFormats = ['missing','choice','truefalse'];
    return bossFormats[randInclusive(bossFormats.length-1)];
  }
  return formats[randInclusive(formats.length-1)];
}

function buildBaseProblem(){
  op=ops[randInclusive(ops.length-1)];
  const mode = chooseProblemMode();

  if(op === '+'){
    if(mode==='bridge10'){
      a=randBetween(6,9); b=randBetween(2,9); correctAns=a+b;
    } else if(mode==='doubleDigit'){
      a=randBetween(10,maxNum); b=randBetween(10,maxNum); correctAns=a+b;
    } else {
      a=randInclusive(maxNum); b=randInclusive(maxNum); correctAns=a+b;
    }
  } else if(op === '-'){
    if(mode==='bridge10'){
      a=randBetween(11,19); b=randBetween(2,9); correctAns=a-b;
    } else if(mode==='doubleDigit'){
      a=randBetween(10,maxNum); b=randBetween(10,a); correctAns=a-b;
    } else {
      a=randInclusive(maxNum); b=randInclusive(maxNum); if(b>a){[a,b]=[b,a];} correctAns=a-b;
    }
  } else if(op === '×'){
    if(mode==='hardMultiply'){
      a=randBetween(Math.max(4,Math.floor(maxNum/5)), Math.max(6,Math.floor(maxNum/2)));
      b=randBetween(Math.max(4,Math.floor(maxNum/5)), Math.max(6,Math.floor(maxNum/2)));
      correctAns=a*b;
    } else if(mode==='doubleDigit'){
      a=randBetween(5,Math.max(10,Math.floor(maxNum/3)));
      b=randBetween(10,Math.max(12,Math.floor(maxNum/2)));
      correctAns=a*b;
    } else {
      a=randInclusive(maxNum); b=randInclusive(maxNum); correctAns=a*b;
    }
  } else if(op === '÷'){
    if(mode==='remainderFreeDivision'){
      b=randBetween(2,Math.max(2,Math.floor(maxNum/2)));
      correctAns=randBetween(2,maxNum);
      a=b*correctAns;
    } else {
      b=randInclusive(Math.max(maxNum-1,1))+1;
      correctAns=randInclusive(maxNum);
      a=b*correctAns;
    }
  }
}

function makeChoices(correctValue){
  const vals = new Set([correctValue]);
  while(vals.size < 4){
    let candidate = correctValue + randBetween(-10,10);
    if(candidate === correctValue) continue;
    if(candidate < 0) candidate = Math.abs(candidate) + 1;
    vals.add(candidate);
  }
  const arr = Array.from(vals);
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function renderProblem(){
  const answerInput = document.getElementById('answer');
  const choiceArea = document.getElementById('choiceArea');
  const checkBtn = document.getElementById('checkBtn');
  const bossLabel = document.getElementById('bossLabel');

  bossLabel.innerText = isBossCard ? '👹 Boss Card' : '';
  choiceArea.style.display = 'none';
  choiceArea.innerHTML = '';
  answerInput.style.display = 'inline-block';
  checkBtn.style.display = 'inline-block';

  if(currentFormat === 'standard'){
    document.getElementById('problem').innerText=`${a} ${op} ${b} = ?`;
  } else if(currentFormat === 'missing'){
    const hideA = Math.random() < 0.5;
    if(hideA){
      document.getElementById('problem').innerText=`? ${op} ${b} = ${correctAns}`;
      answerInput.dataset.answer = a;
    } else {
      document.getElementById('problem').innerText=`${a} ${op} ? = ${correctAns}`;
      answerInput.dataset.answer = b;
    }
  } else if(currentFormat === 'choice'){
    document.getElementById('problem').innerText=`${a} ${op} ${b} = ?`;
    const choices = makeChoices(correctAns);
    answerInput.style.display = 'none';
    checkBtn.style.display = 'none';
    choiceArea.style.display = 'flex';
    choices.forEach(val=>{
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerText = val;
      btn.onclick = ()=>checkChoice(val);
      choiceArea.appendChild(btn);
    });
  } else if(currentFormat === 'truefalse'){
    let shown = correctAns;
    currentStatementTruth = true;
    if(Math.random() < 0.5){
      currentStatementTruth = false;
      let fake = correctAns + randBetween(-8,8);
      if(fake === correctAns) fake += 1;
      if(fake < 0) fake = Math.abs(fake) + 1;
      shown = fake;
    }
    document.getElementById('problem').innerText=`${a} ${op} ${b} = ${shown}`;
    answerInput.style.display = 'none';
    checkBtn.style.display = 'none';
    choiceArea.style.display = 'flex';
    ['True','False'].forEach(label=>{
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerText = label;
      btn.onclick = ()=>checkChoice(label === 'True');
      choiceArea.appendChild(btn);
    });
  }

  answerInput.value = '';
  answerInput.focus();
}

function nextProblem(){
  awaitingNext=false;
  isBossCard = combo > 0 && combo % 5 === 0;
  buildBaseProblem();
  currentFormat = chooseFormat();
  document.getElementById('feedback').innerText='';
  renderProblem();
  updateScoreLine();
}

function updateScoreLine(){
  document.getElementById('score').innerText=
    `Score: ${correct}/${total} • Difficulty: ≤ ${maxNum} • In a row: ${combo}`;
}

function showPopup(msg){
  const p=document.getElementById('popup');
  p.innerText=msg;
  p.style.display='block';
  beep(880,250);
  setTimeout(()=>{p.style.display='none';},1400);
}

function showReward(streakValue){
  const data = REWARD_DATA[streakValue];
  if(!data) return;
  document.getElementById('rewardArt').innerText=data.art;
  document.getElementById('rewardTitle').innerText=data.title;
  document.getElementById('rewardText').innerText=data.text;
  document.getElementById('rewardBackdrop').style.display='block';
  document.getElementById('rewardModal').style.display='block';
  rewardSound();
}

function showBossBanner(){
  document.getElementById('rewardBackdrop').style.display='block';
  document.getElementById('bossBanner').style.display='block';
  bossSound();
}

function hideReward(){
  document.getElementById('rewardBackdrop').style.display='none';
  document.getElementById('rewardModal').style.display='none';
  document.getElementById('bossBanner').style.display='none';
}
document.getElementById('rewardBackdrop').addEventListener('click', hideReward);
document.getElementById('rewardModal').addEventListener('click', hideReward);
document.getElementById('bossBanner').addEventListener('click', hideReward);

function adjustDifficulty(){
  const allCorrect = (correctStreak === 4);
  const noneCorrect = (correctStreak === 0);
  const old=maxNum;
  if(allCorrect){maxNum=Math.min(maxNum+1,MAX_NUM);}
  else if(noneCorrect){maxNum=Math.max(maxNum-1,MIN_NUM);}
  if(maxNum!==old){
    const msg=allCorrect?`🎉 Perfect set! Difficulty up to ${maxNum}!`:`💪 Keep practicing! Difficulty down to ${maxNum}.`;
    showPopup(msg);
  }
  streak=0;
  correctStreak=0;
}

function getExpectedAnswer(){
  if(currentFormat === 'missing'){
    return parseInt(document.getElementById('answer').dataset.answer, 10);
  }
  return correctAns;
}

function finishAnswer(gotItRight, correctDisplay){
  if(awaitingNext) return;
  total++;
  streak++;

  if(gotItRight){
    correct++;
    correctStreak++;
    combo++;
    document.getElementById('feedback').innerText='✅ Correct!';
    beep(660,200);
  }else{
    combo=0;
    document.getElementById('feedback').innerText=`❌ Correct answer: ${correctDisplay}`;
    beep(180,400,'sawtooth',0.16);
  }

  if(streak===4){
    adjustDifficulty();
  }

  updateScoreLine();

  if(REWARD_MILESTONES.includes(combo)){
    setTimeout(()=>showReward(combo), 250);
  }

  awaitingNext=true;
  setTimeout(()=>{
    if(combo > 0 && combo % 5 === 0 && gotItRight){
      showBossBanner();
      setTimeout(()=>{ hideReward(); nextProblem(); }, 1200);
    } else {
      nextProblem();
    }
  }, 1000);
}

function checkAnswer(){
  const ans=parseInt(document.getElementById('answer').value,10);
  if(isNaN(ans)) return;
  const expected = getExpectedAnswer();
  finishAnswer(ans === expected, expected);
}

function checkChoice(choiceValue){
  if(currentFormat === 'truefalse'){
    finishAnswer(choiceValue === currentStatementTruth, currentStatementTruth ? 'True' : 'False');
  } else {
    finishAnswer(choiceValue === correctAns, correctAns);
  }
}

function endQuiz(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('setup').style.display='block';
  hideReward();
}
</script>
</body>
</html>
